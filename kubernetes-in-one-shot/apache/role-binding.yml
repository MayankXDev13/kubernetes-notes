apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  # name of the role binding
  name: apache-manager-rolebinding
  namespace: apache
subjects:
- kind: User
  # name of the resoures
  name: apache-user
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  # name of the role
  name: apache-manager
  apiGroup: rbac.authorization.k8s.io
