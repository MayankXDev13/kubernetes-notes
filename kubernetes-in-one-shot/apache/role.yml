kind: Role
apiVersion: rbac.authorization.k8s.io/v1

metadata:
  # name of the role
  name: apache-manager
  # name space
  namespace: apache
rules:
  - apiGroups: ["", "apps", "rbac.authorization.k8s.io", "batch"]
    resources: ["pods", "deployments", "services", "hpa"]
    verbs: ["get", "apply", "delete", "list"]
