kind: Pod
apiVersion: v1
metadata:
  name: sidecar-test
spec:
  volumes:
    - name: shared-logs
      emptyDir: {}
  containers:
    # main-container creates a log file and writes "Hello Dosto" to it every 5 seconds
    - name: main-container
      image: busybox:latest
      command:
        [
          "sh",
          "-c",
          "while true; do echo 'Hello Dosto' >> /var/log/app.log; sleep 5; done",
        ]
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log

    # display the log file created by main-container
    - name: sidecar-container
      image: busybox:latest
      command: ["sh", "-c", "tail -f /var/log/app.log"]
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log
